services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal
      POSTGRES_DB: signal_lab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal -d signal_lab"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      backend:
        condition: service_started

  loki:
    image: grafana/loki:3.4.2
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.4.2
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
      - loki

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://signal:signal@postgres:5432/signal_lab?schema=public
      PORT: "3001"
      FRONTEND_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: docker
    labels:
      com.docker.compose.service: backend
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      GRAFANA_BROWSER_ORIGIN: http://localhost:3002
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/frontend/app:/app/apps/frontend/app
      - ./apps/frontend/components:/app/apps/frontend/components
      - ./apps/frontend/lib:/app/apps/frontend/lib
      - ./apps/frontend/public:/app/apps/frontend/public
      - ./apps/frontend/next.config.ts:/app/apps/frontend/next.config.ts:ro
    depends_on:
      - backend

volumes:
  pgdata:
